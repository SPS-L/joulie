name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: ktlint
        run: ./gradlew ktlintCheck --no-daemon --stacktrace

      - name: Android Lint
        run: ./gradlew :app:lint --no-daemon --stacktrace

      - name: JVM unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Release smoke (unsigned APK — keystore absent in CI)
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Upload lint report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

      - name: Upload ktlint report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ktlint-report
          path: app/build/reports/ktlint/
          if-no-files-found: ignore

      - name: Upload unit test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore
