name: Nightly instrumented tests

# Deliberately decoupled from `ci.yml`. Emulator boot dwarfs the rest
# of the gate's runtime, so PR feedback stays fast and the instrumented
# suite runs on a separate cadence.
#
# Triggers:
#   - cron at 02:00 UTC daily (low runner-contention window)
#   - workflow_dispatch for on-demand verification before tagged releases
#
# Failures here do NOT block PR merges. The job is informational; treat
# a red run as a tripwire, not a gate. Per-feature instrumented coverage
# decisions live in their own backlog tasks.

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

# A previous nightly that overruns midnight should be cancelled when the
# next one starts; otherwise long-failing builds queue up.
concurrency:
  group: nightly-instrumented-${{ github.ref }}
  cancel-in-progress: true

jobs:
  instrumented:
    name: connectedDebugAndroidTest (API ${{ matrix.api-level }})
    # Hardware acceleration via KVM is gated behind a Linux runner with the
    # right kernel module access. ubuntu-latest currently provides this for
    # x86_64 system images via reactivecircus/android-emulator-runner.
    runs-on: ubuntu-latest
    # Tests run in ~5 min on a hot AVD cache (cold boot ~60 s with KVM,
    # gradle ~3 min). 25 min covers the cold-cache first run that has to
    # rebuild the AVD + snapshot from scratch via the
    # `reactivecircus/android-emulator-runner` setup step. Boot/Run/Kill
    # each have their own `timeout-minutes` so a single hang can't burn
    # the whole budget.
    timeout-minutes: 25
    strategy:
      # Run both ends of the supported SDK range independently. One failure
      # should not mask the other; both reports get uploaded.
      fail-fast: false
      matrix:
        api-level: [26, 35]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Required for hardware-accelerated emulator boots on the GitHub-hosted
      # ubuntu-latest runner. Without this step the AVD falls back to slow
      # software emulation and the matrix routinely times out.
      - name: Enable KVM permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Pre-warm the AVD snapshot so the test step starts from a hot boot
      # rather than paying the cold-boot cost twice. Hot boot also yields
      # a more deterministic test run than re-booting between attempts.
      # Cache-key suffix is bumped whenever a stale snapshot is suspected
      # — bumping forces a fresh AVD + snapshot built against the current
      # emulator binary and system images.
      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}-default-x86_64-v2

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "Generated AVD snapshot for caching."

      # The test phase boots and tears down the emulator manually instead
      # of using `reactivecircus/android-emulator-runner@v2` again. The
      # action's own shutdown logic deterministically hangs for ~12 min
      # on API 26 after BUILD SUCCESSFUL: it sends `adb emu kill`, the
      # emulator's gRPC `stop` endpoint logs `ERROR | stop: Not implemented`,
      # and the action then never returns — even with
      # ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: '5' the action acknowledges
      # the value in its log but still blocks on something else afterwards.
      # The action stays in use for the AVD-creation step above, where
      # the snapshot path works fine and there is no shutdown phase.
      # GitHub-hosted ubuntu-latest runners install the Android SDK at
      # /usr/local/lib/android/sdk but do NOT put platform-tools or
      # emulator on PATH by default — `reactivecircus/android-emulator-runner`
      # sets that up internally. Push both onto PATH for the entire job
      # so the manual Boot / Run / Kill steps below can call `adb` and
      # `emulator` by name.
      - name: Add Android SDK tools to PATH
        run: |
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/emulator" >> "$GITHUB_PATH"

      # The AVD cache only stores ~/.android/avd/* and ~/.android/adb*, not
      # $ANDROID_HOME/emulator/ or $ANDROID_HOME/system-images/. On cache
      # hit, the `reactivecircus/android-emulator-runner` step is skipped,
      # so the emulator binary and the system image the cached AVD points
      # at are never installed and Boot emulator fails with
      # "emulator: command not found". Install both explicitly here so
      # the step is correct regardless of cache state. sdkmanager is
      # idempotent — when reactivecircus already installed these on the
      # cache-miss path this is a no-op.
      - name: Ensure emulator + system image installed
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install \
            "emulator" \
            "platform-tools" \
            "system-images;android-${{ matrix.api-level }};default;x86_64" \
            > /dev/null

      # `-no-snapshot` (= `-no-snapshot-load -no-snapshot-save`) forces a
      # cold boot. We deliberately don't rely on the cached snapshot — when
      # the runner image's emulator binary drifts ahead of the snapshot
      # format, snapshot load hangs silently with no log output. The AVD
      # config is still cached, which is what saves real time; cold-boot
      # under KVM is ~60s, well inside the 8-min budget.
      - name: Boot emulator
        timeout-minutes: 8
        run: |
          emulator -avd test \
            -no-snapshot -no-window -gpu swiftshader_indirect \
            -noaudio -no-boot-anim -camera-back none \
            > "$RUNNER_TEMP/emulator.log" 2>&1 &
          EMU_PID=$!
          echo "Emulator pid: $EMU_PID"
          # Single bounded poll: device must come online AND finish booting
          # within 6 minutes. Each iteration prints state so a hang is
          # diagnosable from the log. `adb wait-for-device` produces no
          # output and obscures the failure mode, so we don't use it.
          BOOTED=0
          for i in $(seq 1 120); do
            EMU_STATE=$(kill -0 "$EMU_PID" 2>/dev/null && echo running || echo dead)
            DEV_STATE=$(adb get-state 2>/dev/null || echo offline)
            if [ "$DEV_STATE" = "device" ]; then
              BOOT=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
              BOOTANIM=$(adb shell getprop init.svc.bootanim 2>/dev/null | tr -d '\r')
            else
              BOOT=""
              BOOTANIM=""
            fi
            echo "[$i] emu=$EMU_STATE dev=$DEV_STATE boot_completed='$BOOT' bootanim='$BOOTANIM'"
            if [ "$BOOT" = "1" ]; then
              BOOTED=1
              break
            fi
            if [ "$EMU_STATE" = "dead" ]; then
              echo "Emulator process exited before boot completed." >&2
              break
            fi
            sleep 3
          done
          adb devices -l || true
          if [ "$BOOTED" != "1" ]; then
            echo "Boot did not complete. Last 200 lines of emulator log:" >&2
            tail -n 200 "$RUNNER_TEMP/emulator.log" >&2 || true
            exit 1
          fi
          # Match what `disable-animations: true` does inside the action.
          # Without these three settings,
          # swipe_showsSnackbar_undo_restoresRow fails with "Animations
          # or transitions are enabled on the target device".
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0
          echo "Emulator booted and animations disabled."

      - name: Run instrumented tests
        timeout-minutes: 10
        run: ./gradlew :app:connectedDebugAndroidTest --no-daemon --stacktrace

      # Always-run cleanup. SIGKILL anything qemu-shaped so post-action
      # cache + artifact-upload steps have no live emulator hanging on.
      - name: Kill emulator
        if: always()
        run: |
          adb emu kill || true
          pkill -9 -f qemu-system || true

      - name: Upload emulator log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-log-api${{ matrix.api-level }}
          path: ${{ runner.temp }}/emulator.log
          if-no-files-found: ignore

      - name: Upload HTML test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: connected-android-test-report-api${{ matrix.api-level }}
          path: app/build/reports/androidTests/connected/
          if-no-files-found: ignore

      - name: Upload raw test results (XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: connected-android-test-results-api${{ matrix.api-level }}
          path: app/build/outputs/androidTest-results/connected/
          if-no-files-found: ignore
