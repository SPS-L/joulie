name: Nightly instrumented tests

# TASK-34: deliberately decoupled from `ci.yml`. Emulator boot dwarfs
# the rest of the gate's runtime, so PR feedback stays fast and the
# instrumented suite runs on a separate cadence.
#
# Triggers:
#   - cron at 02:00 UTC daily (low runner-contention window)
#   - workflow_dispatch for on-demand verification before tagged releases
#
# Failures here do NOT block PR merges. The job is informational; treat
# a red run as a tripwire, not a gate. Per-feature instrumented coverage
# decisions live in their own backlog tasks.

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

# A previous nightly that overruns midnight should be cancelled when the
# next one starts; otherwise long-failing builds queue up.
concurrency:
  group: nightly-instrumented-${{ github.ref }}
  cancel-in-progress: true

jobs:
  instrumented:
    name: connectedDebugAndroidTest (API ${{ matrix.api-level }})
    # Hardware acceleration via KVM is gated behind a Linux runner with the
    # right kernel module access. ubuntu-latest currently provides this for
    # x86_64 system images via reactivecircus/android-emulator-runner.
    runs-on: ubuntu-latest
    # Tests + emulator boot are <5 min each on a hot AVD cache. The 20-min
    # cap exists to bound the damage from emulator-runner's post-step
    # shutdown hang on API 26 — the suite reports BUILD SUCCESSFUL, then
    # the action waits indefinitely on the emulator's gRPC `stop` endpoint
    # which logs `ERROR | stop: Not implemented` on Oreo system images.
    # See the explicit `Force-kill emulator` step below; the cap is the
    # belt to that fix's braces.
    timeout-minutes: 20
    strategy:
      # Run both ends of the supported SDK range independently. One failure
      # should not mask the other; both reports get uploaded.
      fail-fast: false
      matrix:
        api-level: [26, 35]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Required for hardware-accelerated emulator boots on the GitHub-hosted
      # ubuntu-latest runner. Without this step the AVD falls back to slow
      # software emulation and the matrix routinely times out.
      - name: Enable KVM permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Pre-warm the AVD snapshot so the test step starts from a hot boot
      # rather than paying the cold-boot cost twice. Hot boot also yields
      # a more deterministic test run than re-booting between attempts.
      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}-default-x86_64-v1

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "Generated AVD snapshot for caching."

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        timeout-minutes: 15
        with:
          api-level: ${{ matrix.api-level }}
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # Force-kill the emulator after the gradle task so the action's
          # post-step shutdown doesn't hang. On API 26 the emulator's gRPC
          # `stop` endpoint logs `ERROR | stop: Not implemented` and the
          # action waits forever for a clean shutdown. `adb emu kill` plus
          # a SIGKILL on the qemu process completes the same job in <2 s.
          # `|| true` ensures cleanup runs even if the gradle task failed.
          script: |
            ./gradlew :app:connectedDebugAndroidTest --no-daemon --stacktrace
            EXIT=$?
            adb emu kill || true
            pkill -9 -f qemu-system || true
            exit $EXIT

      # Belt to the in-script cleanup's braces. Runs even if the test step
      # was killed by the step-level timeout-minutes, so an emulator that
      # somehow survives doesn't hang the post-action cache step.
      - name: Force-kill emulator (post-test safety net)
        if: always()
        run: |
          adb emu kill || true
          pkill -9 -f qemu-system || true

      - name: Upload HTML test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: connected-android-test-report-api${{ matrix.api-level }}
          path: app/build/reports/androidTests/connected/
          if-no-files-found: ignore

      - name: Upload raw test results (XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: connected-android-test-results-api${{ matrix.api-level }}
          path: app/build/outputs/androidTest-results/connected/
          if-no-files-found: ignore
