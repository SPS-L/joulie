name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p "${{ runner.temp }}/signing"
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > "${{ runner.temp }}/signing/release.jks"

      - name: Write keystore.properties
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/signing/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          {
            printf 'storeFile=%s\n' "$KEYSTORE_PATH"
            printf 'storePassword=%s\n' "$KEYSTORE_PASSWORD"
            printf 'keyAlias=%s\n' "$KEY_ALIAS"
            printf 'keyPassword=%s\n' "$KEY_PASSWORD"
          } > keystore.properties

      - name: Write ADI registration token
        env:
          ADI_REGISTRATION_TOKEN: ${{ secrets.ADI_REGISTRATION_TOKEN }}
        run: |
          if [ -z "$ADI_REGISTRATION_TOKEN" ]; then
            echo "::error::ADI_REGISTRATION_TOKEN secret is unset. Set it in repo Settings -> Secrets -> Actions so the CI APK is registered against the developer keystore." >&2
            exit 1
          fi
          mkdir -p app/src/main/assets
          printf '%s' "$ADI_REGISTRATION_TOKEN" > app/src/main/assets/adi-registration.properties

      # Refresh app/src/main/assets/ev_models.json with a fresh
      # upstream + supplement merge so the tagged APK bundles the
      # latest data, even if the monthly ev-db-update workflow hasn't
      # run since the supplement changed. The committed asset acts as
      # a baseline; this step overwrites it for the build only — it
      # is NOT committed back to the repo.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Refresh bundled ev_models.json (upstream + supplement merge)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EV_DB_LOCAL_OUTPUT: app/src/main/assets/ev_models.json
        run: |
          pip install -r scripts/requirements.txt
          python3 scripts/update_ev_db.py

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Verify APK signature
        run: |
          BUILD_TOOLS_DIR=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)
          "$BUILD_TOOLS_DIR/apksigner" verify --verbose app/build/outputs/apk/release/app-release.apk

      - name: Verify ADI registration asset is bundled
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          SIZE=$(unzip -p "$APK" assets/adi-registration.properties 2>/dev/null | wc -c)
          if [ "$SIZE" -le 0 ]; then
            echo "::error::ADI registration asset missing or empty in $APK (size=$SIZE)." >&2
            exit 1
          fi
          echo "ADI registration asset present in APK (size=${SIZE} bytes)."

      - name: Rename APK with tag
        id: rename
        run: |
          TAG="${GITHUB_REF_NAME:-manual}"
          OUT="app/build/outputs/apk/release/joulie-${TAG}.apk"
          cp app/build/outputs/apk/release/app-release.apk "$OUT"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: joulie-release-apk
          path: ${{ steps.rename.outputs.apk }}
          if-no-files-found: error

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename.outputs.apk }}
          fail_on_unmatched_files: true
          generate_release_notes: true

      - name: Clean up signing material
        if: always()
        run: |
          rm -f keystore.properties
          rm -f app/src/main/assets/adi-registration.properties
          rm -rf "${{ runner.temp }}/signing"
