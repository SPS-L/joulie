name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p "${{ runner.temp }}/signing"
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > "${{ runner.temp }}/signing/release.jks"

      - name: Write keystore.properties
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/signing/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          {
            printf 'storeFile=%s\n' "$KEYSTORE_PATH"
            printf 'storePassword=%s\n' "$KEYSTORE_PASSWORD"
            printf 'keyAlias=%s\n' "$KEY_ALIAS"
            printf 'keyPassword=%s\n' "$KEY_PASSWORD"
          } > keystore.properties

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Verify APK signature
        run: |
          BUILD_TOOLS_DIR=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)
          "$BUILD_TOOLS_DIR/apksigner" verify --verbose app/build/outputs/apk/release/app-release.apk

      - name: Rename APK with tag
        id: rename
        run: |
          TAG="${GITHUB_REF_NAME:-manual}"
          OUT="app/build/outputs/apk/release/joulie-${TAG}.apk"
          cp app/build/outputs/apk/release/app-release.apk "$OUT"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: joulie-release-apk
          path: ${{ steps.rename.outputs.apk }}
          if-no-files-found: error

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename.outputs.apk }}
          fail_on_unmatched_files: true
          generate_release_notes: true

      - name: Clean up signing material
        if: always()
        run: |
          rm -f keystore.properties
          rm -rf "${{ runner.temp }}/signing"
