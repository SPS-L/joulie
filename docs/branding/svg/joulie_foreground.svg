<?xml version="1.0" encoding="UTF-8"?>
<!-- Adaptive-icon FOREGROUND only.
     Android requires a 108×108dp canvas where the central 72×72dp is the
     "safe zone" guaranteed to be visible after all mask/parallax effects.
     Rendered here at 1024 to keep precision; the foreground bolt sits
     within the safe circle so the launcher is never clipped. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bolt" x1="0.2" y1="0" x2="0.7" y2="1">
      <stop offset="0%"  stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#A6F43C"/>
      <stop offset="100%" stop-color="#00C2D1"/>
    </linearGradient>
    <filter id="boltShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.40"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g filter="url(#boltShadow)">
    <path fill="url(#bolt)"
          d="M 360 200
             L 712 200
             L 712 318
             L 600 318
             L 540 470
             L 660 470
             L 470 760
             C 432 818, 380 840, 332 840
             C 248 840, 196 786, 196 706
             L 312 706
             C 312 738, 332 758, 360 758
             C 380 758, 396 748, 410 728
             L 488 608
             L 360 608
             Z"/>
  </g>
  <path fill="#FFFFFF" opacity="0.32"
        d="M 360 200 L 712 200 L 712 248 L 360 248 Z"/>
</svg>
