<?xml version="1.0" encoding="UTF-8"?>
<!-- Joulie app mark v3 — Lightning-bolt "J" on the brand-blue squircle.
     Canvas 1024×1024. Safe zone: central Ø660. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#1F3DCC"/>
      <stop offset="55%" stop-color="#0D47FF"/>
      <stop offset="100%" stop-color="#0A2FB0"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0.2" y1="0" x2="0.7" y2="1">
      <stop offset="0%"  stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#A6F43C"/>
      <stop offset="100%" stop-color="#00C2D1"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="boltShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.40"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Squircle tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#tile)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#glow)"/>

  <!-- Bolt-J:
       crossbar (J's serif) → diagonal strike (J's stem) → curved hook at base. -->
  <g filter="url(#boltShadow)">
    <path fill="url(#bolt)"
          d="M 360 200
             L 712 200
             L 712 318
             L 600 318
             L 540 470
             L 660 470
             L 470 760
             C 432 818, 380 840, 332 840
             C 248 840, 196 786, 196 706
             L 312 706
             C 312 738, 332 758, 360 758
             C 380 758, 396 748, 410 728
             L 488 608
             L 360 608
             Z"/>
  </g>

  <!-- Highlight on the crossbar -->
  <path fill="#FFFFFF" opacity="0.32"
        d="M 360 200 L 712 200 L 712 248 L 360 248 Z"/>
</svg>
